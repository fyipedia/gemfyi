# Smithery configuration for gemfyi
# https://smithery.ai/docs/build/project-config
startCommand:
  type: stdio
  configSchema:
    type: object
    required: []
    properties: {}
  commandFunction: |-
    config => ({ command: 'uvx', args: ['--from', 'gemfyi[mcp]', 'python', '-m', 'gemfyi.mcp_server'] })
